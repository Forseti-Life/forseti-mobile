<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Forseti - Stay Informed, Stay Safe. Real-time crime safety monitoring.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Forseti - Stay Informed, Stay Safe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      height: 100%;
      width: 100%;
      background: #2a2a3e;
    }
    body {
      min-height: 100vh;
      width: 100%;
      background: #2a2a3e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Android phone container - Standard size */
    #phone-container {
      width: 360px;
      height: 800px;
      background: #0a0a0a;
      box-shadow: 0 10px 60px rgba(0, 0, 0, 0.8);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 10px solid #1a1a1a;
      margin: auto;
    }
    #root {
      width: 100%;
      height: 100%;
      min-height: 800px;
      background: #1a1a2e;
      overflow: hidden;
      position: relative;
    }
    /* Device info overlay */
    #device-info {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 212, 255, 0.9);
      color: #000;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      font-weight: bold;
      z-index: 99999;
      box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
    }
  </style>
</head>
<body>
  <div id="phone-container">
    <div id="root"></div>
  </div>
  <script>
    console.log('🚀 Forseti Mobile - Android Preview Mode');
    console.log('📱 Resolution: 360x800px (Standard Android)');
    console.log('Root element:', document.getElementById('root'));
    console.log('Phone container:', document.getElementById('phone-container'));
    
    // Debug visibility
    setTimeout(() => {
      const root = document.getElementById('root');
      const phone = document.getElementById('phone-container');
      console.log('Root children:', root?.children.length);
      console.log('Root HTML length:', root?.innerHTML.length);
      console.log('Phone visible:', phone ? window.getComputedStyle(phone).display : 'not found');
      
      // Check if content is actually rendering but hidden
      if (root && root.children.length > 0) {
        const firstChild = root.children[0];
        const styles = window.getComputedStyle(firstChild);
        console.log('First child tag:', firstChild.tagName);
        console.log('First child display:', styles.display);
        console.log('First child height:', styles.height);
        console.log('First child position:', styles.position);
        console.log('First child overflow:', styles.overflow);
        console.log('First child has children:', firstChild.children.length);
        
        // Check all children
        for (let i = 0; i < Math.min(firstChild.children.length, 5); i++) {
          const child = firstChild.children[i];
          const childStyles = window.getComputedStyle(child);
          console.log(`Child ${i}: ${child.tagName}, height: ${childStyles.height}, display: ${childStyles.display}`);
        }
      }
    }, 2000);
  </script>
</body>
</html>

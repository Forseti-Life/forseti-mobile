// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        kotlinVersion = "1.8.22"
        androidXCoreVersion = "1.13.1"

        // We use NDK 25 which has both M1 support and is the side-by-side NDK version from AGP.
        ndkVersion = "25.1.8937393"
    }
    repositories {
        mavenCentral()
        maven { url 'https://maven.google.com' }
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.0.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

subprojects {
    // Match Kotlin JVM target to what React Native modules use
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            jvmTarget = "11"
        }
    }
    
    // Force androidx.core version to avoid AGP 8.6+ requirement
    configurations.all {
        resolutionStrategy {
            force "androidx.core:core:1.13.1"
            force "androidx.core:core-ktx:1.13.1"
        }
    }
    
    // Ensure all subprojects use accessible repositories
    repositories {
        mavenCentral()
        maven { url 'https://maven.google.com' }
    }
}
